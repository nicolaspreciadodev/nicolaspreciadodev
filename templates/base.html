{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoSport</title>
    {% tailwind_css %}
</head>
<body class="bg-dark text-white font-sans min-h-screen flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-card border-r border-gray-800 hidden md:flex flex-col">
        <div class="h-16 flex items-center px-6 border-b border-gray-800">
            <h1 class="text-2xl font-bold tracking-wider">Go<span class="text-neon">Sport</span></h1>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="{% url 'dashboard' %}" class="block px-4 py-2 rounded text-gray-300 hover:bg-gray-800 hover:text-neon transition-colors duration-200">Resultados</a>
            <a href="{% url 'dashboard' %}" class="block px-4 py-2 rounded text-neon bg-gray-800/50 transition-colors duration-200">Dashboard</a>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-neon text-dark flex items-center justify-center font-bold uppercase ring-2 ring-neon/20">
                    {{ user.username|make_list|first }}
                </div>
                <div class="overflow-hidden">
                    <p class="text-sm font-semibold truncate">{{ user.first_name|default:user.username }}</p>
                    <p class="text-xs text-gray-400 capitalize truncate">{{ user.get_role_display }}</p>
                </div>
            </div>
            <form action="{% url 'logout' %}" method="post" class="mt-4">
                {% csrf_token %}
                <button type="submit" class="w-full text-left text-sm text-red-400 hover:text-red-300 transition-colors">Cerrar Sesión</button>
            </form>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative overflow-hidden">
        <!-- Background Accents -->
        <div class="absolute top-0 right-0 -mr-32 -mt-32 w-96 h-96 rounded-full bg-neon opacity-5 blur-3xl pointer-events-none"></div>

        <!-- Mobile Header -->
        <header class="md:hidden h-16 bg-card border-b border-gray-800 flex items-center justify-between px-4 z-10 relative">
            <h1 class="text-xl font-bold tracking-wider">Go<span class="text-neon">Sport</span></h1>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="text-red-400 text-sm font-medium">Salir</button>
            </form>
        </header>

        <div class="flex-1 p-6 md:p-8 overflow-y-auto z-10 relative">
            {% block content %}{% endblock content %}
        </div>
    </main>
</body>
</html>
