<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoSport — Contraseña Actualizada</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="card">
        <div class="logo">Go<span>Sport</span></div>

        <div class="icon-area">
            <i data-lucide="mail-check" style="width:32px;height:32px;"></i>
        </div>

        <h2>¡Revisa tu correo!</h2>
        <p class="subtitle">
            Si el correo que ingresaste está registrado, recibirás un enlace para restablecer tu contraseña en los próximos minutos.
        </p>

        <div class="info-box">
            <strong>¿No ves el correo?</strong><br>
            Revisa tu carpeta de spam o correo no deseado. El enlace expira en <strong>1 hora</strong>.
        </div>

        <a href="{% url 'login' %}" class="back-link">
            <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
            Volver al inicio de sesión
        </a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
