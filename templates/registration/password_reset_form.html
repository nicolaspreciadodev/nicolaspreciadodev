<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoSport — Recuperar Contraseña</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="card">
        <div class="logo">Go<span>Sport</span></div>

        <div class="icon-area">
            <i data-lucide="key-round" style="width:28px;height:28px;"></i>
        </div>

        <h2>¿Olvidaste tu contraseña?</h2>
        <p class="subtitle">
            Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.
        </p>

        <form method="POST">
            {% csrf_token %}
            <label class="form-label" for="id_email">Correo electrónico</label>
            <div class="input-wrapper">
                <i data-lucide="mail" class="input-icon"></i>
                <input type="email" name="email" id="id_email"
                       class="form-input" placeholder="tu@email.com"
                       autofocus autocomplete="email" required>
            </div>
            <button type="submit" class="btn-primary">
                <span>Enviar enlace de recuperación</span>
            </button>
        </form>

        <a href="{% url 'login' %}" class="back-link">
            <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
            Volver al inicio de sesión
        </a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
