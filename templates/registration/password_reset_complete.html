<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoSport — Contraseña Actualizada</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="card">
        <div class="logo">Go<span>Sport</span></div>

        <div class="icon-area">
            <i data-lucide="shield-check" style="width:32px;height:32px;"></i>
        </div>

        <h2>¡Contraseña actualizada!</h2>
        <p class="subtitle">
            Tu contraseña fue restablecida exitosamente. Ya puedes iniciar sesión con tu nueva contraseña.
        </p>

        <a href="{% url 'login' %}" class="btn-primary">
            <span>Ir al inicio de sesión</span>
        </a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
